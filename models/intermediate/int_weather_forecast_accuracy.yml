version: 2

models:
  - name: int_weather_forecast_accuracy
    description: Compares 7-day forecasted daily weather against the actual observed weather for the same city and date, to measure forecast accuracy. Grain - one row per city per date with both a forecast and an actual observation.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - forecast_date
    columns:
      - name: city_name
        description: Name of the city.
        tests:
          - not_null
      - name: forecast_date
        description: Calendar date both forecasted and observed.
        tests:
          - not_null
      - name: forecast_temp_max_celsius
        description: Forecasted maximum temperature, in degrees Celsius.
      - name: actual_temp_max_celsius
        description: Observed maximum temperature, in degrees Celsius.
      - name: temp_max_error_celsius
        description: Forecast error for max temperature (forecast minus actual), in degrees Celsius.
      - name: forecast_temp_min_celsius
        description: Forecasted minimum temperature, in degrees Celsius.
      - name: actual_temp_min_celsius
        description: Observed minimum temperature, in degrees Celsius.
      - name: temp_min_error_celsius
        description: Forecast error for min temperature (forecast minus actual), in degrees Celsius.
      - name: forecast_precipitation_mm
        description: Forecasted total precipitation, in millimeters.
      - name: actual_precipitation_mm
        description: Observed total precipitation, in millimeters.
      - name: precipitation_error_mm
        description: Forecast error for precipitation (forecast minus actual), in millimeters.
      - name: forecast_wind_speed_max_kmh
        description: Forecasted maximum wind speed, in km/h.
      - name: actual_wind_speed_max_kmh
        description: Observed maximum wind speed, in km/h.
      - name: wind_speed_max_error_kmh
        description: Forecast error for max wind speed (forecast minus actual), in km/h.
