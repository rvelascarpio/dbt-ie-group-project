version: 2

models:
  - name: int_weather_daily_unioned
    description: Unions recent daily weather (past_days) with historical daily weather (2023-2024) into one continuous timeline per city, using the subset of columns common to both. Grain - one row per city per date.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - weather_date
    columns:
      - name: city_name
        description: Name of the city.
        tests:
          - not_null
      - name: weather_date
        description: Calendar date of the daily measurement.
        tests:
          - not_null
      - name: temp_max_celsius
        description: Maximum temperature of the day, in degrees Celsius.
      - name: temp_min_celsius
        description: Minimum temperature of the day, in degrees Celsius.
      - name: precipitation_mm
        description: Total precipitation for the day, in millimeters.
      - name: data_source
        description: Which staging model the row came from, either 'recent_weather' or 'historical_weather'.
        tests:
          - accepted_values:
              values: ['recent_weather', 'historical_weather']
