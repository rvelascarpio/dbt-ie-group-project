version: 2

models:
  - name: int_air_quality_daily
    description: Aggregates hourly air quality observations to daily grain per city. Grain - one row per city per day.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - quality_date
    columns:
      - name: location_id
        description: Identifier of the city, foreign key to stg_locations.
        tests:
          - not_null
      - name: city_name
        description: Name of the city.
        tests:
          - not_null
      - name: country_code
        description: ISO country code of the city.
      - name: quality_date
        description: Calendar date of the aggregated measurements.
        tests:
          - not_null
      - name: avg_pm10_ug_m3
        description: Average PM10 concentration for the day, in micrograms per cubic meter.
      - name: max_pm10_ug_m3
        description: Maximum PM10 concentration for the day, in micrograms per cubic meter.
      - name: avg_pm2_5_ug_m3
        description: Average PM2.5 concentration for the day, in micrograms per cubic meter.
      - name: max_pm2_5_ug_m3
        description: Maximum PM2.5 concentration for the day, in micrograms per cubic meter.
      - name: avg_carbon_monoxide_ug_m3
        description: Average carbon monoxide concentration for the day, in micrograms per cubic meter.
      - name: avg_nitrogen_dioxide_ug_m3
        description: Average nitrogen dioxide concentration for the day, in micrograms per cubic meter.
      - name: avg_ozone_ug_m3
        description: Average ozone concentration for the day, in micrograms per cubic meter.
      - name: avg_european_aqi
        description: Average European Air Quality Index for the day.
      - name: max_european_aqi
        description: Maximum European Air Quality Index for the day.
      - name: hours_observed
        description: Number of hourly observations aggregated into this row.
