version: 2

models:
  - name: stg_locations
    description: City metadata from the Open-Meteo Geocoding API. Grain - one row per city.
    columns:
      - name: location_id
        description: Unique identifier of the city (Open-Meteo geocoding id).
        tests:
          - unique
          - not_null
      - name: city_name
        description: Name of the city.
        tests:
          - not_null
      - name: country
        description: Country name.
      - name: country_code
        description: ISO country code.
      - name: region
        description: First-level administrative region (state/province).
      - name: latitude
        description: Latitude of the city.
      - name: longitude
        description: Longitude of the city.
      - name: timezone
        description: Timezone of the city.
      - name: elevation_meters
        description: Elevation above sea level, in meters.
      - name: population
        description: Population of the city.
      - name: extracted_at
        description: Timestamp when this location record was extracted from the API.
