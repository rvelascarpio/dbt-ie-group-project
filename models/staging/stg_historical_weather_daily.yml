version: 2

models:
  - name: stg_historical_weather_daily
    description: Historical daily weather per city (2023-2024) from the Open-Meteo Historical Weather API. Grain - one row per city per day.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - weather_date
    columns:
      - name: city_name
        description: Name of the city the measurement belongs to.
        tests:
          - not_null
      - name: weather_date
        description: Calendar date of the daily measurement.
        tests:
          - not_null
      - name: temp_max_celsius
        description: Maximum temperature of the day, in degrees Celsius.
      - name: temp_min_celsius
        description: Minimum temperature of the day, in degrees Celsius.
      - name: precipitation_mm
        description: Total precipitation for the day, in millimeters.
