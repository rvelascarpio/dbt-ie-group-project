version: 2

models:
  - name: stg_forecast_daily
    description: Daily weather forecast per city from the Open-Meteo Forecast API (forecast_days). Grain - one row per city per forecast date per extraction run.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - forecast_date
            - extracted_at
    columns:
      - name: source_name
        description: Label of the extraction source (constant 'forecast').
        tests:
          - accepted_values:
              values: ['forecast']
      - name: extracted_at
        description: Timestamp when the forecast was pulled from the API.
      - name: location_id
        description: Identifier of the city, foreign key to stg_locations.
        tests:
          - not_null
      - name: city_name
        description: Name of the city the forecast belongs to.
        tests:
          - not_null
      - name: country_code
        description: ISO country code of the city.
      - name: forecast_date
        description: Calendar date the forecast refers to.
        tests:
          - not_null
      - name: latitude
        description: Latitude of the city.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -90
              max_value: 90
      - name: longitude
        description: Longitude of the city.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -180
              max_value: 180
      - name: timezone
        description: Timezone of the city.
      - name: temp_max_celsius
        description: Forecasted maximum temperature of the day, in degrees Celsius.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -60
              max_value: 60
      - name: temp_min_celsius
        description: Forecasted minimum temperature of the day, in degrees Celsius.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -60
              max_value: 60
      - name: temp_mean_celsius
        description: Forecasted mean temperature of the day, in degrees Celsius.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -60
              max_value: 60
      - name: precipitation_mm
        description: Forecasted total precipitation for the day, in millimeters.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000
      - name: rain_mm
        description: Forecasted total rain for the day, in millimeters.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000
      - name: snowfall_cm
        description: Forecasted total snowfall for the day, in centimeters.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 300
      - name: wind_speed_max_kmh
        description: Forecasted maximum sustained wind speed at 10m, in km/h.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 200
      - name: wind_gust_max_kmh
        description: Forecasted maximum wind gust at 10m, in km/h.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 250
