version: 2

models:
  - name: stg_weather_forecast_7d
    description: 7-day daily weather forecast per city from the Open-Meteo Forecast API. Grain - one row per city per forecast date per extraction run.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - forecast_date
    columns:
      - name: city_name
        description: Name of the city the forecast belongs to.
        tests:
          - not_null
      - name: latitude
        description: Latitude of the city.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -90
              max_value: 90
      - name: longitude
        description: Longitude of the city.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -180
              max_value: 180
      - name: forecast_date
        description: Calendar date the forecast applies to.
        tests:
          - not_null
      - name: weather_code
        description: WMO weather code for the day.
      - name: temp_max_celsius
        description: Maximum forecast temperature of the day, in degrees Celsius.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -60
              max_value: 60
      - name: temp_min_celsius
        description: Minimum forecast temperature of the day, in degrees Celsius.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -60
              max_value: 60
      - name: apparent_temp_max_celsius
        description: Maximum apparent ("feels like") temperature of the day, in degrees Celsius.
      - name: apparent_temp_min_celsius
        description: Minimum apparent ("feels like") temperature of the day, in degrees Celsius.
      - name: sunrise
        description: Local sunrise time.
      - name: sunset
        description: Local sunset time.
      - name: daylight_duration_seconds
        description: Duration of daylight, in seconds.
      - name: sunshine_duration_seconds
        description: Duration of sunshine, in seconds.
      - name: uv_index_max
        description: Maximum UV index of the day.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 20
      - name: uv_index_clear_sky_max
        description: Maximum UV index of the day under clear sky conditions.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 20
      - name: precipitation_mm
        description: Total precipitation for the day, in millimeters.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000
      - name: rain_mm
        description: Total rain for the day, in millimeters.
      - name: showers_mm
        description: Total showers for the day, in millimeters.
      - name: snowfall_cm
        description: Total snowfall for the day, in centimeters.
      - name: precipitation_hours
        description: Number of hours with precipitation during the day.
      - name: precipitation_probability_max_pct
        description: Maximum probability of precipitation during the day, as a percentage.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
      - name: wind_speed_max_kmh
        description: Maximum wind speed at 10m during the day, in km/h.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 200
      - name: wind_gusts_max_kmh
        description: Maximum wind gusts at 10m during the day, in km/h.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 300
      - name: wind_direction_dominant_deg
        description: Dominant wind direction at 10m during the day, in degrees.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 360
      - name: shortwave_radiation_sum_mj_m2
        description: Total shortwave solar radiation for the day, in MJ/m².
      - name: et0_fao_evapotranspiration_mm
        description: FAO Penman-Monteith reference evapotranspiration for the day, in millimeters.
