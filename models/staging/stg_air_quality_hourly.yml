version: 2

models:
  - name: stg_air_quality_hourly
    description: Hourly air quality observations per city from the Open-Meteo Air Quality API. Grain - one row per city per hour.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - measured_at
    columns:
      - name: source_name
        description: Label of the extraction source (constant 'air_quality').
      - name: extracted_at
        description: Timestamp when the data was pulled from the API.
      - name: location_id
        description: Identifier of the city, foreign key to stg_locations.
        tests:
          - not_null
      - name: city_name
        description: Name of the city the measurement belongs to.
        tests:
          - not_null
      - name: country_code
        description: ISO country code of the city.
      - name: measured_at
        description: Local timestamp of the hourly measurement.
        tests:
          - not_null
      - name: latitude
        description: Latitude of the city.
      - name: longitude
        description: Longitude of the city.
      - name: timezone
        description: Timezone of the city.
      - name: pm10_ug_m3
        description: Particulate matter up to 10 micrometers, in micrograms per cubic meter.
      - name: pm2_5_ug_m3
        description: Particulate matter up to 2.5 micrometers, in micrograms per cubic meter.
      - name: carbon_monoxide_ug_m3
        description: Carbon monoxide concentration, in micrograms per cubic meter.
      - name: nitrogen_dioxide_ug_m3
        description: Nitrogen dioxide concentration, in micrograms per cubic meter.
      - name: ozone_ug_m3
        description: Ozone concentration, in micrograms per cubic meter.
      - name: european_aqi
        description: European Air Quality Index, a dimensionless composite score.
