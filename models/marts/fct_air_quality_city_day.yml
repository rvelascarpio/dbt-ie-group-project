version: 2

models:
  - name: fct_air_quality_city_day
    description: Daily air quality fact, combining pollutant levels, health-threshold alert flags, and population exposure into a single city-day record. Grain - one row per city per day.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - quality_date
    columns:
      - name: location_id
        description: Identifier of the city, foreign key to dim_location.
        tests:
          - not_null
      - name: city_name
        description: Name of the city.
        tests:
          - not_null
          - relationships:
              to: ref('dim_location')
              field: city_name
      - name: country_code
        description: ISO country code of the city.
      - name: quality_date
        description: Calendar date of the aggregated air quality measurements.
        tests:
          - not_null
      - name: avg_pm10_ug_m3
        description: Average PM10 concentration for the day, in micrograms per cubic meter.
      - name: max_pm10_ug_m3
        description: Maximum PM10 concentration for the day, in micrograms per cubic meter.
      - name: avg_pm2_5_ug_m3
        description: Average PM2.5 concentration for the day, in micrograms per cubic meter.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000
      - name: max_pm2_5_ug_m3
        description: Maximum PM2.5 concentration for the day, in micrograms per cubic meter.
      - name: avg_carbon_monoxide_ug_m3
        description: Average carbon monoxide concentration for the day, in micrograms per cubic meter.
      - name: avg_nitrogen_dioxide_ug_m3
        description: Average nitrogen dioxide concentration for the day, in micrograms per cubic meter.
      - name: avg_ozone_ug_m3
        description: Average ozone concentration for the day, in micrograms per cubic meter.
      - name: avg_european_aqi
        description: Average European Air Quality Index for the day.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 500
      - name: max_european_aqi
        description: Maximum European Air Quality Index for the day.
      - name: hours_observed
        description: Number of hourly observations aggregated into this row.
      - name: exceeds_who_pm2_5_guideline
        description: True if the daily mean PM2.5 exceeds the WHO (2021) 24h guideline of 15 ug/m3.
      - name: exceeds_eu_aqi_poor_threshold
        description: True if the average European AQI is 60 or above (the "Poor" band on the EEA 0-100+ scale).
      - name: population
        description: Population of the city, from dim_location.
      - name: pm2_5_population_exposure_index
        description: Approximate population exposure to PM2.5, computed as avg_pm2_5_ug_m3 * population.
