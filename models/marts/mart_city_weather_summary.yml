version: 2

models:
  - name: mart_city_weather_summary
    description: Wide reporting table joining daily weather, daily air quality, and city attributes, intended as the primary table for the Streamlit dashboard. Grain - one row per city per date (air quality columns are null on dates without air quality coverage).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - weather_date
    columns:
      - name: city_name
        description: Name of the city.
        tests:
          - not_null
          - relationships:
              to: ref('dim_location')
              field: city_name
      - name: weather_date
        description: Calendar date of the row.
        tests:
          - not_null
      - name: country
        description: Country name, from dim_location.
      - name: country_code
        description: ISO country code, from dim_location.
      - name: region
        description: First-level administrative region, from dim_location.
      - name: population
        description: Population of the city, from dim_location.
      - name: temp_max_celsius
        description: Daily maximum temperature, in degrees Celsius.
      - name: temp_min_celsius
        description: Daily minimum temperature, in degrees Celsius.
      - name: precipitation_mm
        description: Total daily precipitation, in millimeters.
      - name: avg_pm2_5_ug_m3
        description: Average PM2.5 concentration for the day, in micrograms per cubic meter.
      - name: avg_european_aqi
        description: Average European Air Quality Index for the day.
      - name: exceeds_who_pm2_5_guideline
        description: True if the daily mean PM2.5 exceeds the WHO (2021) 24h guideline of 15 ug/m3.
      - name: exceeds_eu_aqi_poor_threshold
        description: True if the average European AQI is 60 or above (the "Poor" band on the EEA 0-100+ scale).
