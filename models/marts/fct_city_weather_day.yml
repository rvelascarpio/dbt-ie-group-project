version: 2

models:
  - name: fct_city_weather_day
    description: Daily weather fact, spanning the recent (past_days) and historical (2023-2024) timeline. Grain - one row per city per date.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - weather_date
    columns:
      - name: city_name
        description: Name of the city.
        tests:
          - not_null
          - relationships:
              to: ref('dim_location')
              field: city_name
      - name: weather_date
        description: Calendar date of the weather observation.
        tests:
          - not_null
      - name: data_source
        description: Whether this row came from the recent_weather or historical_weather extraction.
        tests:
          - accepted_values:
              values: ['recent_weather', 'historical_weather']
      - name: temp_max_celsius
        description: Daily maximum temperature, in degrees Celsius.
      - name: temp_min_celsius
        description: Daily minimum temperature, in degrees Celsius.
      - name: precipitation_mm
        description: Total daily precipitation, in millimeters.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000
