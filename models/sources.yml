version: 2

sources:
  - name: raw
    schema: main
    description: "Raw Open-Meteo data loaded into DuckDB by create_db.py."
    tables:
      - name: locations
        description: "City metadata from the Geocoding API. Grain: one row per selected city."
      - name: weather_daily
        description: "Recent daily weather from the Forecast API (past_days). Grain: one row per city per day."
      - name: weather_forecast_7d
        description: "7-day daily weather forecast from the Forecast API. Grain: one row per city per forecast date per extraction run."
      - name: air_quality_hourly
        description: "Air quality forecast observations. Grain: one row per city per hour."
      - name: historical_weather_daily
        description: "Historical daily weather (Historical Weather API, 2023-2024). Grain: one row per city per day."
      - name: forecast_daily
        description: "7-day daily weather forecast from the Forecast API (extract_open_meteo.py). Grain: one row per city per forecast date per extraction run."
